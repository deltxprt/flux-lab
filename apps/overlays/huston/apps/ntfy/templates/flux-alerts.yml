title: |
  {{- if eq .severity "error" }}
  ❌ {{ .involvedObject.name }}
  {{- else if eq .severity "warning" }}
  ⚠️ {{ .involvedObject.name }}
  {{- else }}
  ℹ️ {{ .involvedObject.name }}
  {{- end }}
message: |
  Kind: {{ .involvedObject.kind }}
  Namespace: {{ .involvedObject.namespace }}
  Name: {{ .involvedObject.name }}
  Message: {{ .message }}
  Reason: {{ .reason }}
priority: |
  {{- if eq .severity "error" }}4
  {{- else if eq .severity "warning" }}3
  {{- else }}1
  {{- end }}

